name: Release

# Attests build provenance for the plugin's release assets and attaches them
# to an existing GitHub Release (created separately, since notes are hand
# written). Runs automatically on a version tag push, or manually against an
# already-published tag via workflow_dispatch.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attest and upload assets for"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        run: npm test

      - name: Build
        run: npm run build --if-present

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          gh release upload "$TAG" main.js manifest.json styles.css --clobber --repo "${{ github.repository }}"
